<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Achantrou | Data Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #161b22;
            --accent-color: #00d4ff;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* --- SECTION 1 : HERO --- */
        header { height: 85vh; display: flex; align-items: center; justify-content: space-between; }
        .hero-content { flex: 1; text-align: right; padding-right: 60px; }
        .hero-image { flex: 1; }
        .hero-image img { width: 100%; border-radius: 15px; border: 1px solid #30363d; }
        h1 { font-size: 3.8rem; margin: 0; color: var(--accent-color); }
        .role { font-size: 2rem; font-weight: 300; margin: 10px 0; }
        .tagline { color: var(--text-dim); font-size: 1.1rem; max-width: 500px; margin-left: auto; }

        /* --- SECTION 2 : À PROPOS (2 COLONNES) --- */
        .about-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items: start; padding: 80px 0; }
        .profile-box { text-align: center; background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid #30363d; }
        .profile-box img { width: 150px; height: 150px; border-radius: 50%; border: 2px solid var(--accent-color); margin-bottom: 20px; object-fit: cover; }
        
        .pipeline-flow { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .step { 
            background: var(--card-bg); border: 1px solid var(--accent-color); 
            padding: 12px 20px; border-radius: 5px; width: 100%; text-align: center;
            font-size: 0.9rem; position: relative;
        }
        .connector { color: var(--accent-color); font-size: 1.2rem; margin: -5px 0; }

        /* --- SECTION 3 : STACK TECHNIQUE --- */
        .stack-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; }
        .stack-box { background: var(--card-bg); padding: 25px; border-radius: 10px; border: 1px solid #30363d; }
        .stack-box h3 { color: var(--accent-color); display: flex; align-items: center; gap: 10px; font-size: 1.1rem; margin-top: 0; }
        .stack-box h3 i { color: var(--accent-color); }
        .stack-list { list-style: none; padding: 0; margin: 15px 0 0 0; }
        .stack-list li { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.95rem; }
        .stack-list li i { color: var(--accent-color); font-size: 0.8rem; }

        /* --- SECTION 4 : PROJETS --- */
        .project-large { 
            background: var(--card-bg); border-radius: 20px; margin-bottom: 40px; 
            display: flex; overflow: hidden; border: 1px solid #30363d;
        }
        .pj-img { width: 45%; background-size: cover; background-position: center; min-height: 320px; }
        .pj-info { width: 55%; padding: 40px; }
        .pj-tag { font-size: 0.7rem; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 4px 10px; border-radius: 15px; margin-right: 5px; display: inline-block; margin-top: 5px; }
        .btn-action { display: inline-block; padding: 10px 20px; background: var(--accent-color); color: #000; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }

        .other-projects-list { margin-top: 50px; background: rgba(22, 27, 34, 0.6); padding: 30px; border-radius: 15px; }
        .other-item { display: flex; justify-content: space-between; border-bottom: 1px solid #30363d; padding: 15px 0; }

        /* --- FOOTER --- */
        footer { padding: 60px 0; text-align: center; border-top: 1px solid #30363d; }
        .contact-icons a { color: var(--accent-color); font-size: 2rem; margin: 0 20px; text-decoration: none; }
        
        section { padding: 80px 0; }
        h2 { color: var(--text-main); margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
